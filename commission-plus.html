<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลัง Prompt AI | ไทยประกันชีวิต</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:      #0D3B8C;
  --blue-mid:  #1557C0;
  --blue-lite: #2E7AE0;
  --blue-pale: #EAF2FF;
  --blue-pale2:#d4e8ff;
  --gold:      #F0A500;
  --gold-lt:   #ffc62b;
  --gold-pale: #fff8e7;
  --white:     #ffffff;
  --g50:       #f5f7fb;
  --g100:      #eef1f7;
  --g200:      #dde3ef;
  --g400:      #8a94a8;
  --g600:      #5a6478;
  --g700:      #445066;
  --g900:      #1a2236;
  --shadow:    0 2px 10px rgba(13,59,140,.09);
  --shadow-md: 0 8px 32px rgba(13,59,140,.15);
  --r:         14px;
  --r-sm:      8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh}

/* ── HEADER ── */
header{background:var(--blue);overflow:hidden;position:relative}
header::before{content:'';position:absolute;top:-55px;right:-75px;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,.05)}
header::after{content:'';position:absolute;bottom:-35px;left:18%;width:170px;height:170px;border-radius:50%;background:rgba(240,165,0,.10)}
.header-inner{max-width:1100px;margin:0 auto;padding:22px 32px;display:flex;align-items:center;gap:16px;position:relative;z-index:1}
.back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 16px;border-radius:var(--r-sm);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.88rem;text-decoration:none;transition:background .2s;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.28)}
.htext h1{font-family:'Noto Serif Thai',serif;font-size:1.4rem;font-weight:700;color:#fff}
.htext p{font-size:.82rem;color:rgba(255,255,255,.7);margin-top:3px}
.gold-bar{height:4px;background:linear-gradient(90deg,var(--gold),var(--gold-lt),var(--gold))}

/* ── MAIN ── */
main{max-width:1100px;margin:0 auto;padding:32px 32px 64px}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 42px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:'Sarabun',sans-serif;font-size:.92rem;background:var(--white);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--blue-lite)}
.sico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--g400);pointer-events:none}
.badge{background:var(--white);border:1.5px solid var(--g200);padding:8px 16px;border-radius:var(--r);font-size:.82rem;color:var(--g400);white-space:nowrap}
.badge b{color:var(--blue)}
.refresh-btn{background:var(--white);border:1.5px solid var(--g200);width:38px;height:38px;border-radius:var(--r-sm);cursor:pointer;font-size:1rem;transition:all .2s;color:var(--g700);display:flex;align-items:center;justify-content:center}
.refresh-btn:hover{border-color:var(--blue-lite);color:var(--blue)}

/* ── FILTER TABS ── */
.tabs{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:5px 15px;border:1.5px solid var(--g200);border-radius:20px;background:var(--white);font-family:'Sarabun',sans-serif;font-size:.81rem;font-weight:600;color:var(--g400);cursor:pointer;transition:all .18s}
.tab:hover{border-color:var(--blue-lite);color:var(--blue)}
.tab.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}

/* ── CARD ── */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1.5px solid var(--g200);overflow:hidden;transition:all .22s;cursor:pointer;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:var(--blue-lite)}
.card:active{transform:translateY(-1px)}

.card-top{background:var(--blue-pale);padding:16px 18px 13px;display:flex;align-items:flex-start;gap:12px;transition:background .2s}
.card:hover .card-top{background:var(--blue-pale2)}

.thumb{width:62px;height:62px;border-radius:10px;object-fit:cover;flex-shrink:0;border:2px solid rgba(13,59,140,.12);background:var(--g100)}
.thumb-ico{width:62px;height:62px;border-radius:10px;flex-shrink:0;background:rgba(13,59,140,.08);border:2px solid rgba(13,59,140,.10);display:flex;align-items:center;justify-content:center;font-size:1.75rem}

.cmeta{flex:1;min-width:0}
.ctitle{font-family:'Noto Serif Thai',serif;font-size:.95rem;font-weight:700;color:var(--blue);line-height:1.3;margin-bottom:5px}
.ctags{display:flex;gap:5px;flex-wrap:wrap}
.ctag{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(13,59,140,.10);color:var(--blue);letter-spacing:.02em}
.ctag.cat{background:rgba(13,59,140,.18)}

.card-body{padding:13px 18px;flex:1}
.preview{font-size:.82rem;color:var(--g600);line-height:1.62;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}

.card-foot{padding:10px 18px;border-top:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.hint{font-size:.73rem;color:var(--g400)}
.open-btn{display:inline-flex;align-items:center;gap:5px;background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:var(--r-sm);font-family:'Sarabun',sans-serif;font-size:.79rem;font-weight:700;cursor:pointer;transition:background .18s}
.open-btn:hover{background:var(--blue-mid)}

/* ── STATES ── */
.state{text-align:center;padding:64px 24px;color:var(--g400)}
.state .ico{font-size:2.6rem;margin-bottom:12px;display:block}
.state p{font-size:.9rem}
.spinner{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NOTICE / ERROR ── */
.err{background:#fff5f5;border:1.5px solid #fcc;border-radius:var(--r);padding:16px 20px;display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}
.err p{font-size:.86rem;color:#c0392b;line-height:1.5}
.err details{font-size:.78rem;color:#c0392b;margin-top:6px;cursor:pointer}

/* ── OVERLAY / MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(8,20,55,.58);z-index:999;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(3px)}
.overlay.open{display:flex}

.modal{background:var(--white);border-radius:var(--r);width:100%;max-width:660px;max-height:93vh;display:flex;flex-direction:column;box-shadow:0 28px 72px rgba(13,59,140,.25);animation:mIn .22s ease}
@keyframes mIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}

.mhead{background:var(--blue);padding:18px 20px;border-radius:var(--r) var(--r) 0 0;display:flex;align-items:flex-start;gap:14px;flex-shrink:0}
.mthumb{width:50px;height:50px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,.25);flex-shrink:0;background:rgba(255,255,255,.1)}
.mthumb-ico{width:50px;height:50px;border-radius:10px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:1.55rem;flex-shrink:0}
.mtitle-wrap{flex:1;min-width:0}
.mtitle{font-family:'Noto Serif Thai',serif;font-size:1.05rem;font-weight:700;color:#fff;line-height:1.25}
.msub{font-size:.79rem;color:rgba(255,255,255,.65);margin-top:3px}
.mclose{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1.05rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .18s;line-height:1}
.mclose:hover{background:rgba(255,255,255,.32)}

.mbody{padding:20px 22px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.mlabel{font-size:.79rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.mdesc{font-size:.84rem;color:var(--g600);line-height:1.58;background:var(--blue-pale);border-radius:var(--r-sm);padding:10px 14px}

textarea.prompt-ta{width:100%;min-height:190px;padding:13px 15px;border:1.5px solid var(--g200);border-radius:var(--r-sm);font-family:'Sarabun',sans-serif;font-size:.90rem;line-height:1.68;color:var(--g900);resize:vertical;outline:none;transition:border-color .2s;background:var(--g50)}
textarea.prompt-ta:focus{border-color:var(--blue-lite);background:#fff}

.mhint{font-size:.76rem;color:var(--g400);display:flex;align-items:center;gap:5px}

.mfoot{padding:13px 22px;border-top:1px solid var(--g100);display:flex;gap:9px;justify-content:flex-end;flex-shrink:0;flex-wrap:wrap}
.btn-reset{display:inline-flex;align-items:center;gap:5px;background:var(--white);color:var(--g700);border:1.5px solid var(--g200);padding:9px 18px;border-radius:var(--r-sm);font-family:'Sarabun',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .18s}
.btn-reset:hover{border-color:var(--blue-lite);color:var(--blue)}
.btn-copy{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;border:none;padding:9px 22px;border-radius:var(--r-sm);font-family:'Sarabun',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .18s;white-space:nowrap}
.btn-copy:hover{background:var(--blue-mid)}
.btn-copy.ok{background:#16a34a}

/* ── FOOTER ── */
footer{text-align:center;padding:22px;font-size:.79rem;color:var(--g400);border-top:1px solid var(--g200);background:var(--white)}
footer b{color:var(--blue)}

/* ── MOBILE ── */
@media(max-width:640px){
  main{padding:20px 14px 48px}
  .header-inner{padding:18px 16px}
  .grid{grid-template-columns:1fr}
  .mfoot{justify-content:stretch}
  .btn-copy,.btn-reset{flex:1;justify-content:center}
  .modal{max-height:96vh}
}
@media(max-width:380px){
  .htext h1{font-size:1.15rem}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-btn" href="index.html">← กลับ</a>
    <div class="htext">
      <h1>🤖 คลัง Prompt AI</h1>
      <p>เลือก Prompt → แก้ไข → คัดลอกไปใช้ได้เลย</p>
    </div>
  </div>
</header>
<div class="gold-bar"></div>

<main>

  <div class="err" id="errBox" style="display:none">
    <span>⚠️</span>
    <div>
      <p id="errMsg"></p>
      <details id="errDetail"><summary>รายละเอียด</summary><span id="errStack"></span></details>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="sico">🔍</span>
      <input type="text" id="q" placeholder="ค้นหา Prompt..." oninput="filter()">
    </div>
    <div class="badge">ทั้งหมด <b id="cnt">-</b> Prompt</div>
    <button class="refresh-btn" onclick="loadData()" title="รีเฟรช">🔄</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab on" onclick="setCat('ทั้งหมด',this)">ทั้งหมด</button>
  </div>

  <div id="container">
    <div class="state"><div class="spinner"></div><p>กำลังโหลด Prompt...</p></div>
  </div>

</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mtitle">
    <div class="mhead">
      <div class="mthumb-ico" id="mthumb">🤖</div>
      <div class="mtitle-wrap">
        <div class="mtitle" id="mtitle">—</div>
        <div class="msub"   id="msub">—</div>
      </div>
      <button class="mclose" onclick="closeModal()" aria-label="ปิด">✕</button>
    </div>
    <div class="mbody">
      <div id="descWrap" style="display:none">
        <div class="mlabel">📌 คำอธิบาย</div>
        <div class="mdesc" id="mdesc"></div>
      </div>
      <div>
        <div class="mlabel">✏️ Prompt — แก้ไขได้ก่อนคัดลอก</div>
        <textarea class="prompt-ta" id="ta" rows="8"></textarea>
        <div class="mhint" style="margin-top:6px">💡 แก้ข้อความในกล่องได้เลย เช่น ใส่ชื่อลูกค้า วันที่ หรือจำนวนเงิน</div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-reset" onclick="resetPrompt()">↺ รีเซ็ต</button>
      <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">📋 คัดลอก Prompt</button>
    </div>
  </div>
</div>

<footer>&copy; 2025 <b>ไทยประกันชีวิต</b> &nbsp;|&nbsp; คลัง Prompt AI สำหรับฝ่ายขาย</footer>

<script>
// ══════════════════════════════════════════════════
//  ⚙️  ตั้งค่า
// ══════════════════════════════════════════════════
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbyer6-27TCXDcaNY21sUfg3IltOtpMZEXHKmwFH9uA44TFeJB5rn3hkSgxsB9uRdnrQWA/exec';
const SHEET_NAME = 'prompts';   // ← ต้องมีใน SHEET_MAP ของ GAS ด้วย

// ชื่อคอลัมน์ใน Sheet (ต้องตรงกับ Header แถวที่ 1)
const C = {
  title  : 'ชื่อ Prompt',
  cat    : 'หมวดหมู่',
  desc   : 'คำอธิบาย',
  prompt : 'Prompt',
  img    : 'รูปภาพ',
  tags   : 'แท็ก',
};
// ══════════════════════════════════════════════════

let all = [], activeCat = 'ทั้งหมด', origPrompt = '', curIdx = -1;

// ── โหลดข้อมูลจาก GAS ───────────────────────────
async function loadData() {
  document.getElementById('container').innerHTML =
    '<div class="state"><div class="spinner"></div><p>กำลังโหลด Prompt จาก Google Sheet...</p></div>';
  document.getElementById('errBox').style.display = 'none';

  const url = `${GAS_URL}?sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;

  try {
    const res = await fetch(url, { cache: 'no-store' });

    if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

    // GAS อาจส่ง Content-Type เป็น text/plain แต่ body เป็น JSON
    const text = await res.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch(parseErr) {
      throw new Error(`JSON parse ล้มเหลว: ${parseErr.message}\nResponse: ${text.slice(0,200)}`);
    }

    if (data.error) throw new Error(
      `GAS ตอบกลับ error: "${data.error}"\n` +
      `→ ตรวจสอบว่า SHEET_MAP ใน GAS มี key "prompts" แล้ว`
    );

    // GAS ส่งกลับเป็น { headers: [...], rows: [...], total: N }
    const rows = Array.isArray(data) ? data : (data.rows || data.data || []);

    if (!rows.length) throw new Error(
      'Sheet "prompts" ไม่มีข้อมูล (rows = 0)\n' +
      '→ ตรวจสอบว่า Tab ชื่อ "prompts" ใน Spreadsheet มีข้อมูลและ Header ถูกต้อง'
    );

    all = rows;
    buildTabs();
    filter();

  } catch(e) {
    showError(e);
    // ไม่ fallback ไป sample อีกต่อไป — แสดง error ชัดเจนแทน
    document.getElementById('container').innerHTML =
      '<div class="state"><span class="ico">❌</span><p>ไม่สามารถโหลดข้อมูลได้<br>ดูรายละเอียดด้านบน</p></div>';
  }
}

function showError(e) {
  const box  = document.getElementById('errBox');
  const msg  = document.getElementById('errMsg');
  const stk  = document.getElementById('errStack');
  const det  = document.getElementById('errDetail');

  box.style.display = 'flex';

  const mainMsg = e.message || String(e);
  // แยก main message กับ stack
  const parts = mainMsg.split('\n');
  msg.textContent = parts[0];
  if (parts.length > 1) {
    stk.textContent = parts.slice(1).join('\n');
    det.style.display = 'block';
  } else {
    det.style.display = 'none';
  }
}

// ── Build category tabs ──────────────────────────
function buildTabs() {
  const cats = [...new Set(all.map(p => p[C.cat] || '').filter(Boolean))];
  const el   = document.getElementById('tabs');
  el.innerHTML = '<button class="tab on" onclick="setCat(\'ทั้งหมด\',this)">ทั้งหมด</button>';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'tab';
    b.textContent = c;
    b.onclick = () => setCat(c, b);
    el.appendChild(b);
  });
}

function setCat(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  filter();
}

// ── Filter + render ──────────────────────────────
function filter() {
  const q = document.getElementById('q').value.toLowerCase();
  let items = all;
  if (activeCat !== 'ทั้งหมด') items = items.filter(p => (p[C.cat]||'') === activeCat);
  if (q) items = items.filter(p =>
    [C.title,C.cat,C.desc,C.tags].some(k => String(p[k]||'').toLowerCase().includes(q))
  );
  render(items);
}

function render(items) {
  document.getElementById('cnt').textContent = items.length;

  if (!items.length) {
    document.getElementById('container').innerHTML =
      '<div class="state"><span class="ico">🔍</span><p>ไม่พบ Prompt ที่ค้นหา</p></div>';
    return;
  }

  const html = '<div class="grid">' + items.map((p) => {
    const realIdx = all.indexOf(p);
    const title   = esc(p[C.title]  || 'Prompt');
    const cat     = esc(p[C.cat]    || '');
    const preview = esc(p[C.prompt] || '(ไม่มีข้อความ)');
    const tags    = (p[C.tags]||'').split(',').map(t=>t.trim()).filter(Boolean);
    const img     = p[C.img] || '';

    const thumbHtml = img
      ? `<img class="thumb" src="${esc(img)}" alt="${title}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="thumb-ico">🤖</div>`;

    const tagsHtml = tags.map(t => `<span class="ctag">${esc(t)}</span>`).join('');

    return `
<div class="card" onclick="openModal(${realIdx})" role="button" tabindex="0"
     onkeydown="if(event.key==='Enter'||event.key===' ')openModal(${realIdx})">
  <div class="card-top">
    ${thumbHtml}
    <div class="cmeta">
      <div class="ctitle">${title}</div>
      <div class="ctags">
        ${cat ? `<span class="ctag cat">${esc(cat)}</span>` : ''}
        ${tagsHtml}
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="preview">${preview}</div>
  </div>
  <div class="card-foot">
    <span class="hint">👆 กดเพื่อแก้ไขและคัดลอก</span>
    <button class="open-btn" tabindex="-1">เปิด Prompt</button>
  </div>
</div>`;
  }).join('') + '</div>';

  document.getElementById('container').innerHTML = html;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Modal ────────────────────────────────────────
function openModal(idx) {
  const p = all[idx];
  if (!p) return;
  curIdx = idx;
  origPrompt = p[C.prompt] || '';

  const img   = p[C.img]   || '';
  const title = p[C.title] || 'Prompt';
  const cat   = p[C.cat]   || '';
  const desc  = p[C.desc]  || '';

  const th = document.getElementById('mthumb');
  if (img) {
    th.outerHTML = `<img class="mthumb" id="mthumb" src="${esc(img)}" alt="${esc(title)}" onerror="this.style.display='none'">`;
  } else {
    if (th.tagName === 'IMG') {
      th.outerHTML = `<div class="mthumb-ico" id="mthumb">🤖</div>`;
    } else {
      th.textContent = '🤖';
    }
  }
  document.getElementById('mtitle').textContent = title;
  document.getElementById('msub').textContent   = cat;

  const dw = document.getElementById('descWrap');
  if (desc) { document.getElementById('mdesc').textContent = desc; dw.style.display='block'; }
  else       { dw.style.display='none'; }

  document.getElementById('ta').value = origPrompt;
  resetCopyBtn();

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('ta').focus(), 220);
}

function bgClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function resetPrompt() {
  document.getElementById('ta').value = origPrompt;
  resetCopyBtn();
}

function resetCopyBtn() {
  const b = document.getElementById('copyBtn');
  b.textContent = '📋 คัดลอก Prompt';
  b.classList.remove('ok');
}

async function copyPrompt() {
  const text = document.getElementById('ta').value;
  const btn  = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.getElementById('ta');
    ta.select(); ta.setSelectionRange(0,99999);
    document.execCommand('copy');
  }
  btn.textContent = '✅ คัดลอกแล้ว!';
  btn.classList.add('ok');
  setTimeout(resetCopyBtn, 2800);
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

loadData();
</script>
</body>
</html>
