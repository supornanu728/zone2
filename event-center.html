<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค่าจัดงาน — ศูนย์ | ไทยประกันชีวิต</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#C8102E;--red-dark:#9e0c24;--gold:#F0A500;--gold-light:#ffc62b;--gold-pale:#fff8e7;--white:#fff;--gray-50:#fafafa;--gray-100:#f4f4f4;--gray-200:#e8e8e8;--gray-400:#999;--gray-700:#444;--gray-900:#1a1a1a;--shadow-sm:0 2px 8px rgba(0,0,0,.07);--radius:14px}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}
  header{background:var(--red);overflow:hidden;position:relative}
  header::after{content:'';position:absolute;top:-30px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.06)}
  .header-inner{max-width:1100px;margin:0 auto;padding:22px 32px;display:flex;align-items:center;gap:16px;position:relative;z-index:1}
  .back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.88rem;text-decoration:none;transition:background .2s}
  .back-btn:hover{background:rgba(255,255,255,.25)}
  .header-text{flex:1}
  .header-text h1{font-family:'Noto Serif Thai',serif;font-size:1.4rem;font-weight:700;color:#fff}
  .header-text p{font-size:.83rem;color:rgba(255,255,255,.7);margin-top:2px}
  .gold-bar{height:4px;background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold))}
  main{max-width:1100px;margin:0 auto;padding:32px 32px 60px}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .search-box{flex:1;min-width:200px;position:relative}
  .search-box input{width:100%;padding:10px 16px 10px 42px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:'Sarabun',sans-serif;font-size:.92rem;background:#fff;outline:none;transition:border-color .2s}
  .search-box input:focus{border-color:var(--red)}
  .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--gray-400)}
  .info-badge{background:#fff;border:1.5px solid var(--gray-200);padding:8px 16px;border-radius:var(--radius);font-size:.83rem;color:var(--gray-400);white-space:nowrap}
  .info-badge span{color:var(--red);font-weight:700}
  .refresh-btn{background:#fff;border:1.5px solid var(--gray-200);padding:9px 14px;border-radius:var(--radius);cursor:pointer;font-size:1rem;transition:all .2s;color:var(--gray-700)}
  .refresh-btn:hover{border-color:var(--red);color:var(--red)}
  .table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1.5px solid var(--gray-200);overflow:hidden}
  .table-head-bar{background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
  .table-head-bar h2{font-family:'Noto Serif Thai',serif;font-size:.95rem;font-weight:700;color:#fff}
  .table-head-bar .updated{font-size:.78rem;color:rgba(255,255,255,.65)}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  thead th{background:var(--gray-100);color:var(--gray-700);font-weight:700;padding:12px 16px;text-align:left;border-bottom:2px solid var(--gray-200);white-space:nowrap;font-size:.82rem;letter-spacing:.02em}
  tbody tr{border-bottom:1px solid var(--gray-100);transition:background .15s}
  tbody tr:hover{background:#fff5f5}
  tbody tr:last-child{border-bottom:none}
  td{padding:12px 16px;color:var(--gray-700)}
  td:first-child{font-weight:600;color:var(--gray-900)}
  .state-box{text-align:center;padding:60px 24px;color:var(--gray-400)}
  .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:#fff5f5;border:1.5px solid #fcc;border-radius:var(--radius);padding:20px 24px;display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
  .error-box p{font-size:.88rem;color:var(--red);line-height:1.55}
  .config-notice{background:var(--gold-pale);border:1.5px solid var(--gold);border-radius:var(--radius);padding:16px 20px;font-size:.83rem;color:#7a5200;margin-bottom:20px;display:flex;align-items:flex-start;gap:10px}
  .config-notice code{background:rgba(0,0,0,.07);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:.85em}
  footer{text-align:center;padding:24px;font-size:.8rem;color:var(--gray-400);border-top:1px solid var(--gray-200);background:#fff}
  footer span{color:var(--red);font-weight:600}
  @media(max-width:640px){main{padding:20px 12px 40px}.header-inner{padding:18px 16px}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="back-btn" href="index.html">← กลับ</a>
    <div class="header-text">
      <h1>🏢 ค่าจัดงาน — ศูนย์</h1>
      <p>Center Event</p>
    </div>
  </div>
</header>
<div class="gold-bar"></div>
<main>
  <div class="config-notice" id="cn">⚙️ <div>กรุณาแทนที่ <code>YOUR_GAS_WEB_APP_URL</code> และตรวจสอบ <code>SHEET_NAME</code> ให้ตรงกับ Tab ค่าจัดงาน (ศูนย์)</div></div>
  <div class="toolbar">
    <div class="search-box"><span class="si">🔍</span><input type="text" id="si" placeholder="ค้นหาข้อมูล..." oninput="f()"></div>
    <div class="info-badge">ทั้งหมด <span id="rc">-</span> รายการ</div>
    <button class="refresh-btn" onclick="load()" title="รีเฟรช">🔄</button>
  </div>
  <div id="eb" class="error-box" style="display:none"><span>⚠️</span><p id="em"></p></div>
  <div class="table-wrap">
    <div class="table-head-bar"><h2>ตารางค่าจัดงาน — ศูนย์</h2><span class="updated" id="ua">—</span></div>
    <div class="table-scroll"><div id="tc"><div class="state-box"><div class="spinner"></div><p>กำลังโหลดข้อมูล...</p></div></div></div>
  </div>
</main>
<footer>&copy; 2025 <span>ไทยประกันชีวิต</span> &nbsp;|&nbsp; ข้อมูลเชื่อมต่อจาก Google Sheets</footer>
<script>
const GAS_URL='YOUR_GAS_WEB_APP_URL', SHEET_NAME='event_center';
let allRows=[],headers=[];
async function load(){
  document.getElementById('tc').innerHTML='<div class="state-box"><div class="spinner"></div><p>กำลังโหลด...</p></div>';
  document.getElementById('eb').style.display='none';document.getElementById('rc').textContent='-';
  try{
    const res=await fetch(`${GAS_URL}?sheet=${encodeURIComponent(SHEET_NAME)}`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const d=await res.json();if(d.error)throw new Error(d.error);
    if(!d.rows||!d.rows.length){document.getElementById('tc').innerHTML='<div class="state-box"><span>📭</span><p>ไม่พบข้อมูล</p></div>';return;}
    headers=d.headers||Object.keys(d.rows[0]);allRows=d.rows;
    document.getElementById('ua').textContent='อัปเดต: '+new Date().toLocaleString('th-TH');
    document.getElementById('cn').style.display='none';render(allRows);
  }catch(e){
    document.getElementById('eb').style.display='flex';document.getElementById('em').textContent='โหลดไม่สำเร็จ: '+e.message;
    document.getElementById('tc').innerHTML='<div class="state-box"><span>⚠️</span><p>ไม่สามารถโหลดได้</p></div>';
  }
}
function render(rows){
  if(!rows.length){document.getElementById('tc').innerHTML='<div class="state-box"><span>🔍</span><p>ไม่พบข้อมูล</p></div>';document.getElementById('rc').textContent='0';return;}
  let h='<table><thead><tr>'+headers.map(x=>`<th>${x}</th>`).join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{h+='<tr>'+headers.map(k=>`<td>${r[k]??''}</td>`).join('')+'</tr>';});
  document.getElementById('tc').innerHTML=h+'</tbody></table>';
  document.getElementById('rc').textContent=rows.length.toLocaleString('th-TH');
}
function f(){const q=document.getElementById('si').value.toLowerCase();render(q?allRows.filter(r=>headers.some(k=>String(r[k]??'').toLowerCase().includes(q))):allRows);}
load();
</script>
</body>
</html>
